<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes | 114132 Space</title>
    <link rel="stylesheet" href="/style.css?v=3.6" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="nav-logo">114132 Space</a>
        <div class="nav-links">
          <a href="/"
            ><span class="zh-text">首页</span
            ><span class="en-text">Home</span></a
          >
          <a href="/notes/" class="active"
            ><span class="zh-text">笔记</span
            ><span class="en-text">Notes</span></a
          >
          <a href="/projects/"
            ><span class="zh-text">项目</span
            ><span class="en-text">Projects</span></a
          >
        </div>
      </div>
    </nav>

    <div class="main-layout">
      <main class="content-area">
        <header style="margin-bottom: 30px">
          <h1 class="zh-text">所有笔记</h1>
          <h1 class="en-text">All Notes & Articles</h1>
        </header>
        <section class="category-section">
          <h2 class="category-title">NixOS</h2>
          <div class="subcategory">
            <h3 class="subcategory-title zh-text">系统安装相关</h3>
            <h3 class="subcategory-title en-text">System Installation</h3>
            <ul class="post-list">
              <li>
                <a href="/notes/anywhere/"
                  ><span class="zh-text"
                    >低内存 VPS 上 NixOS Anywhere 安装指南</span
                  ><span class="en-text"
                    >NixOS-Anywhere Installation Guide for Low-RAM VPS</span
                  ></a
                >
              </li>
            </ul>
          </div>
          <div class="subcategory">
            <h3 class="subcategory-title zh-text">系统与环境配置</h3>
            <h3 class="subcategory-title en-text">
              System & Environment Config
            </h3>
            <ul class="post-list">
              <li>
                <a href="/notes/nix-config/"
                  ><span class="zh-text">我的 NixOS 声明式配置仓库</span
                  ><span class="en-text"
                    >My Declarative NixOS Configuration</span
                  ></a
                >
              </li>
            </ul>
          </div>
        </section>
        <footer>
          <button class="switch-btn" onclick="toggleTheme()">🌓 Theme</button>
          <button class="switch-btn" onclick="toggleLang()">🌐 Language</button>
        </footer>
      </main>
    </div>

    <script>
      const html = document.documentElement;
      if (localStorage.getItem("theme") === "dark")
        html.setAttribute("data-theme", "dark");
      if (localStorage.getItem("lang"))
        html.setAttribute("lang", localStorage.getItem("lang"));
      function toggleTheme() {
        const newTheme =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }
      function toggleLang() {
        const newLang =
          (html.getAttribute("lang") || "zh") === "zh" ? "en" : "zh";
        html.setAttribute("lang", newLang);
        localStorage.setItem("lang", newLang);
      }
    </script>
  </body>
</html>
