<div class="card">
  <h2 class="zh-text">下载最新版本</h2>
  <h2 class="en-text">Download Latest</h2>
  <a
    id="apk-link"
    href="https://github.com/Jaanai-Liu/altitude/releases"
    class="download-btn"
  >
    <span class="zh-text">正在获取最新版本...</span>
    <span class="en-text">Fetching latest version...</span>
  </a>
</div>

<script>
  // 动态获取 GitHub 最新 Release 的 APK 链接
  async function fetchLatestApk() {
    try {
      const response = await fetch(
        "https://api.github.com/repos/Jaanai-Liu/altitude/releases/latest",
      );
      const data = await response.json();
      // 寻找 assets 中以 .apk 结尾的文件
      const apkAsset = data.assets.find((a) => a.name.endsWith(".apk"));
      if (apkAsset) {
        const btn = document.getElementById("apk-link");
        btn.href = apkAsset.browser_download_url;
        btn.innerHTML = `Download ${data.tag_name} (.apk)`;
      }
    } catch (e) {
      console.error("Failed to fetch GitHub release");
    }
  }
  fetchLatestApk();
</script>
