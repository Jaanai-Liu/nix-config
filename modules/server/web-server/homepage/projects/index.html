<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | 114132 Space</title>
    <link rel="stylesheet" href="/style.css?v=3.0" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="nav-logo">114132 Space</a>
        <div class="nav-links">
          <a href="/"
            ><span class="zh-text">首页</span
            ><span class="en-text">Home</span></a
          >
          <a href="/notes/"
            ><span class="zh-text">笔记</span
            ><span class="en-text">Notes</span></a
          >
          <a href="/projects/" style="color: var(--accent)"
            ><span class="zh-text">项目</span
            ><span class="en-text">Projects</span></a
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <header>
        <h1 class="zh-text">项目与应用</h1>
        <h1 class="en-text">Projects & Apps</h1>
      </header>

      <section class="card-grid">
        <a href="/projects/altitude/" class="card hover-effect">
          <h2 class="zh-text">海拔高度表 (Altitude)</h2>
          <h2 class="en-text">Altitude App</h2>
          <p class="zh-text">
            基于 Jetpack Compose 的实时高度仪，高精度 GPS 测算。
          </p>
          <p class="en-text">
            Real-time altimeter built with Compose and GPS hardware data.
          </p>
        </a>
      </section>

      <footer>
        <button class="switch-btn" onclick="toggleTheme()">🌓 Theme</button>
        <button class="switch-btn" onclick="toggleLang()">🌐 Language</button>
      </footer>
    </div>

    <script>
      const html = document.documentElement;
      if (localStorage.getItem("theme") === "dark")
        html.setAttribute("data-theme", "dark");
      if (localStorage.getItem("lang"))
        html.setAttribute("lang", localStorage.getItem("lang"));
      function toggleTheme() {
        const newTheme =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }
      function toggleLang() {
        const newLang =
          (html.getAttribute("lang") || "zh") === "zh" ? "en" : "zh";
        html.setAttribute("lang", newLang);
        localStorage.setItem("lang", newLang);
      }
    </script>
  </body>
</html>
