<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altitude App | 114132</title>
    <link rel="stylesheet" href="/style.css?v=3.5" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="nav-logo">114132 Space</a>
        <div class="nav-links">
          <a href="/"
            ><span class="zh-text">首页</span
            ><span class="en-text">Home</span></a
          >
          <a href="/notes/"
            ><span class="zh-text">笔记</span
            ><span class="en-text">Notes</span></a
          >
          <a href="/projects/" class="active"
            ><span class="zh-text">项目</span
            ><span class="en-text">Projects</span></a
          >
        </div>
      </div>
    </nav>

    <div class="main-layout">
      <main class="content-area">
        <div class="card" style="cursor: default">
          <h1 style="margin-bottom: 20px" class="zh-text">Altitude (海拔仪)</h1>
          <h1 style="margin-bottom: 20px" class="en-text">Altitude App</h1>
          <p class="zh-text" style="margin-bottom: 15px">
            这是一个简洁高效的安卓海拔高度测量工具。无广告，无多余权限。核心功能包括：
          </p>
          <ul
            class="zh-text"
            style="margin-left: 20px; opacity: 0.8; margin-bottom: 30px"
          >
            <li>实时高精度高度读取 (基于 GPS)</li>
            <li>丝滑的动态指南针体验</li>
            <li>轻量级系统资源占用，保护隐私</li>
          </ul>
          <div
            style="
              margin-top: 30px;
              padding-top: 20px;
              border-top: 1px solid var(--border);
            "
          >
            <h2 class="zh-text" style="color: var(--accent)">获取最新版本</h2>
            <h2 class="en-text" style="color: var(--accent)">
              Download Latest Release
            </h2>
            <a
              id="apk-link"
              href="https://github.com/Jaanai-Liu/altitude/releases"
              class="download-btn"
            >
              <span class="zh-text">正在从 GitHub 获取最新版本...</span>
              <span class="en-text">Fetching from GitHub...</span>
            </a>
            <p style="margin-top: 15px; font-size: 0.9rem; opacity: 0.7">
              <span class="zh-text">开源地址：</span>
              <span class="en-text">Source code: </span>
              <a
                href="https://github.com/Jaanai-Liu/altitude"
                target="_blank"
                style="color: var(--accent); font-weight: bold"
                >Jaanai-Liu/altitude</a
              >
            </p>
          </div>
        </div>
        <footer>
          <button class="switch-btn" onclick="toggleTheme()">🌓 Theme</button>
          <button class="switch-btn" onclick="toggleLang()">🌐 Language</button>
        </footer>
      </main>
    </div>

    <script>
      const html = document.documentElement;
      if (localStorage.getItem("theme") === "dark")
        html.setAttribute("data-theme", "dark");
      if (localStorage.getItem("lang"))
        html.setAttribute("lang", localStorage.getItem("lang"));
      function toggleTheme() {
        const newTheme =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }
      function toggleLang() {
        const newLang =
          (html.getAttribute("lang") || "zh") === "zh" ? "en" : "zh";
        html.setAttribute("lang", newLang);
        localStorage.setItem("lang", newLang);
      }

      async function fetchLatestApk() {
        try {
          const response = await fetch(
            "https://api.github.com/repos/Jaanai-Liu/altitude/releases/latest",
          );
          const data = await response.json();
          const apkAsset = data.assets.find((a) => a.name.endsWith(".apk"));
          if (apkAsset) {
            const btn = document.getElementById("apk-link");
            btn.href = apkAsset.browser_download_url;
            btn.innerHTML = `⬇️ Download ${data.tag_name} (.apk)`;
          }
        } catch (e) {
          console.error("Failed to fetch GitHub release", e);
        }
      }
      fetchLatestApk();
    </script>
    <script src="/main.js?v=1.0"></script>
  </body>
</html>
